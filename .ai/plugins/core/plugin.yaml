name: core
version: 1.0.0
description: Core runtime for session state, plan memory, approvals, and event logging.
capabilities:
  - session-runtime
  - plan-memory
  - events
  - approvals
tools:
  - get_runtime_snapshot
  - list_plugins
hooks:
  - scripts/hooks/context-monitor.sh
permissions:
  - read_workspace
  - write_runtime_state
dependencies: []
compatibility:
  framework: ">=1.0.0"
  node: ">=18.0.0"
