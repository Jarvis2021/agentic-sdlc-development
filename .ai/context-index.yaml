# CONTEXT INDEX - Lookup map for on-demand retrieval
# Use this file as a pointer set, not as default prompt context.
version: "1.0"

classification:
  TRIVIAL:
    retrieve:
      - ".ai/NOW.md"
    gates: [lint]
    token_budget: 5000
  LOW:
    retrieve:
      - ".ai/NOW.md"
      - ".ai/project-config.yaml"
    gates: [lint, test]
    token_budget: 20000
  MEDIUM:
    retrieve:
      - ".ai/NOW.md"
      - ".ai/project-config.yaml"
      - ".ai/domain-governance.yaml"
      - ".ai/protocols/implementer.md"
      - ".ai/protocols/reviewer.md"
    gates: [lint, test, review, preflight]
    token_budget: 80000
  HIGH:
    retrieve:
      - ".ai/NOW.md"
      - ".ai/project-config.yaml"
      - ".ai/domain-governance.yaml"
      - ".ai/protocols/implementer.md"
      - ".ai/protocols/reviewer.md"
      - ".ai/protocols/self-healer.md"
    gates: [lint, test, review, security-scan, preflight]
    token_budget: 200000
    requires_human_approval: true

retrieval_paths:
  runtime_state:
    - ".ai/session-state/index.json"
    - ".ai/session-state/events.jsonl"
  diagnostics:
    - ".ai/session-state/diagnostics/"
    - ".ai/traces/"
  governance:
    - "rbac-factbook.yaml"
    - ".ai/project-config.yaml"
    - ".ai/domain-governance.yaml"
  design_history:
    - ".ai/decisions/"
    - ".ai/history/"
  deep_workflows:
    - ".ai/protocols/"
    - ".ai/skills/"

principles:
  - "CLASSIFY FIRST: identify task scope before loading more context"
  - "RETRIEVE, DO NOT PRELOAD: load only what the task needs"
  - "USE STRUCTURED STATE: prefer runtime JSON and diagnostics over broad summaries"
  - "KEEP PROMPTS SMALL: include only non-obvious operational details"
  - "USE EVIDENCE: validate changes with tests, commands, CI, or runtime proof"
