<svg width="1200" height="860" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="860" fill="#0b1220"/>

  <text x="600" y="44" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Agentic SDLC Framework v1.0 Architecture
  </text>
  <text x="600" y="74" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Minimal entrypoint, on-demand retrieval, structured runtime evidence
  </text>

  <rect x="60" y="120" width="1080" height="110" rx="14" fill="#111827" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="600" y="153" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#bfdbfe" text-anchor="middle">Small entrypoint</text>
  <rect x="110" y="172" width="220" height="38" rx="8" fill="#1d4ed8"/>
  <text x="220" y="196" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">AGENTS.md router</text>
  <rect x="390" y="172" width="220" height="38" rx="8" fill="#1d4ed8"/>
  <text x="500" y="196" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Task classification</text>
  <rect x="670" y="172" width="220" height="38" rx="8" fill="#1d4ed8"/>
  <text x="780" y="196" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Lookup pointers only</text>

  <rect x="60" y="265" width="330" height="240" rx="14" fill="#0f3a2e" stroke="#34d399" stroke-width="2.5"/>
  <text x="225" y="305" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#d1fae5" text-anchor="middle">Context resolver</text>
  <text x="225" y="345" font-family="Arial, sans-serif" font-size="14" fill="#a7f3d0" text-anchor="middle">Retrieve only what the task needs</text>
  <text x="225" y="380" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">NOW.md for active work</text>
  <text x="225" y="408" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">project-config and governance on demand</text>
  <text x="225" y="436" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">protocols and skills only when triggered</text>
  <text x="225" y="464" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">source, tests, and diff chosen by task</text>

  <rect x="435" y="265" width="330" height="240" rx="14" fill="#142d5c" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="600" y="305" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#dbeafe" text-anchor="middle">Structured runtime</text>
  <text x="600" y="345" font-family="Arial, sans-serif" font-size="14" fill="#bfdbfe" text-anchor="middle">Small records, reusable across tools</text>
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">`.ai/session-state/`</text>
  <text x="600" y="408" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">plans, approvals, tasks, traces, events</text>
  <text x="600" y="436" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">diagnostics and trace files</text>
  <text x="600" y="464" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">human reports generated only when needed</text>

  <rect x="810" y="265" width="330" height="240" rx="14" fill="#3f245f" stroke="#c084fc" stroke-width="2.5"/>
  <text x="975" y="305" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f3e8ff" text-anchor="middle">Optional capabilities</text>
  <text x="975" y="345" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">Loaded selectively, not by default</text>
  <text x="975" y="380" font-family="Arial, sans-serif" font-size="13" fill="#f3e8ff" text-anchor="middle">protocols</text>
  <text x="975" y="408" font-family="Arial, sans-serif" font-size="13" fill="#f3e8ff" text-anchor="middle">skills</text>
  <text x="975" y="436" font-family="Arial, sans-serif" font-size="13" fill="#f3e8ff" text-anchor="middle">plugin packs</text>
  <text x="975" y="464" font-family="Arial, sans-serif" font-size="13" fill="#f3e8ff" text-anchor="middle">cross-repo and semantic tooling</text>

  <rect x="60" y="560" width="1080" height="120" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="600" y="595" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fde68a" text-anchor="middle">Execution surfaces</text>
  <text x="240" y="640" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7" text-anchor="middle">CLI</text>
  <text x="430" y="640" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7" text-anchor="middle">MCP tools</text>
  <text x="620" y="640" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7" text-anchor="middle">Git hooks and workflows</text>
  <text x="905" y="640" font-family="Arial, sans-serif" font-size="15" fill="#fef3c7" text-anchor="middle">VS Code extension</text>

  <rect x="60" y="720" width="1080" height="90" rx="14" fill="#111827" stroke="#ef4444" stroke-width="2.5"/>
  <text x="600" y="754" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fecaca" text-anchor="middle">Validation model</text>
  <text x="600" y="790" font-family="Arial, sans-serif" font-size="14" fill="#fecaca" text-anchor="middle">Use targeted tests, commands, CI checks, and runtime proof. Prefer observed evidence over broad prompt instructions.</text>

  <path d="M600 230 V255" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M390 385 H435" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M765 385 H810" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M600 505 V560" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M600 680 V720" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
